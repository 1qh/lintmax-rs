name: CI
on: [push, pull_request]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt, llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest,cargo-deny,cargo-machete,cargo-llvm-cov,dprint,typos-cli,ripgrep
      - run: cargo install --path .
      - run: cargo lintmax ci
      - run: cargo lintmax cov-ci
      - uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: lcov.info
  prune-history:
    needs: [ci]
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: .github/scripts
          sparse-checkout-cone-mode: false
      - name: prune all prior CI runs (single-present-run discipline)
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          KEEP_RUN_ID: ${{ github.run_id }}
        run: .github/scripts/prune-ci-runs.sh
