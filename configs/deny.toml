[graph]
all-features = true

[advisories]
ignore = []
yanked = "deny"
unmaintained = "all"

[output]
feature-depth = 1

[licenses]
unused-allowed-license = "allow"
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "Zlib",
  "CDLA-Permissive-2.0",
]
confidence-threshold = 0.93

[licenses.private]
ignore = false

[bans]
multiple-versions = "deny"
multiple-versions-include-dev = true
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
required-git-spec = "rev"
